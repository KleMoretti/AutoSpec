spring:
  application:
    name: autospec-backend
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${MYSQL_DATABASE:autospec}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: ${BACKEND_PORT:8080}

autospec:
  agent-engine:
    base-url: ${AGENT_ENGINE_BASE_URL:http://localhost:8000}
  workflow:
    available-handlers: ${WORKFLOW_AVAILABLE_HANDLERS:FixtureAgent:v1,ProductManagerAgent:v1,ArchitectAgent:v1,BackendEngineerAgent:v1,BackendEngineerAgent:v2,FrontendEngineerAgent:v1,ReviewerAgent:v1,EvaluatorAgent:v1,author_agent:v1,reviewer_agent:v1}
    recovery:
      enabled: ${WORKFLOW_RECOVERY_ENABLED:false}
      lease-timeout: ${WORKFLOW_RECOVERY_LEASE_TIMEOUT:30s}
      fixed-delay: ${WORKFLOW_RECOVERY_FIXED_DELAY:5000}
      initial-delay: ${WORKFLOW_RECOVERY_INITIAL_DELAY:5000}
    events:
      polling:
        enabled: ${WORKFLOW_EVENT_POLLING_ENABLED:false}
        consumer-name: ${WORKFLOW_EVENT_CONSUMER_NAME:control-plane}
        batch-size: ${WORKFLOW_EVENT_BATCH_SIZE:10}
        block-timeout: ${WORKFLOW_EVENT_BLOCK_TIMEOUT:1s}
        fixed-delay: ${WORKFLOW_EVENT_FIXED_DELAY:1000}
        initial-delay: ${WORKFLOW_EVENT_INITIAL_DELAY:1000}
