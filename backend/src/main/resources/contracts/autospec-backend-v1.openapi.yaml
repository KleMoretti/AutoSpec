openapi: 3.0.3
info:
  title: AutoSpec Backend API
  version: v1
  description: Spring Boot API contract for AutoSpec project orchestration, artifacts, exports, and observability.
servers:
  - url: /
security:
  - SessionToken: []
paths:
  /api/contracts/openapi:
    get:
      summary: Fetch the packaged OpenAPI contract for tooling and review.
      security: []
      responses:
        '200':
          description: OpenAPI YAML document.
          content:
            application/yaml:
              schema:
                type: string
  /api/auth/login:
    post:
      summary: Create a demo session token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/prompts/active:
    get:
      summary: List active Agent prompt versions.
      security: []
      responses:
        '200':
          description: Active prompt version list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptVersionResponse'
  /api/projects:
    get:
      summary: List projects visible to the session user.
      parameters:
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Project history visible to the session user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a project from a natural-language requirement.
      parameters:
        - $ref: '#/components/parameters/SessionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: Created project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/projects/{projectId}:
    get:
      summary: Fetch a project visible to the session user.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Project detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/projects/{projectId}/generate:
    post:
      summary: Run the baseline multi-agent project generation workflow.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Generation progress snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/generate-prd:
    post:
      summary: Generate the PRD stage for a project.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: PRD generation progress snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/generate-v4:
    post:
      summary: Run the V4 multi-agent workflow with idempotency.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Generation progress snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '502':
          $ref: '#/components/responses/BadGateway'
  /api/projects/{projectId}/continue:
    post:
      summary: Continue generation after PRD approval.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Continued generation progress snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/projects/{projectId}/progress:
    get:
      summary: Fetch current project generation progress.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Current project generation progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectProgressResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/code-skeleton:
    post:
      summary: Generate and persist a code skeleton export for a project.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Generated code skeleton export payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeGenerationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/code-generation-jobs:
    get:
      summary: List durable code generation jobs.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Code generation job metadata list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CodeGenerationJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/code-generation-jobs/{jobId}/cancel:
    post:
      summary: Cancel a running code generation job.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Cancelled code generation job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeGenerationJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/projects/{projectId}/code-generation-jobs/{jobId}/retry:
    post:
      summary: Retry a failed code generation job.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Retried code skeleton export payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeGenerationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/projects/{projectId}/diagnostics:
    get:
      summary: Summarize project workflow, Agent task, audit, external call, and model telemetry.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Project diagnostics summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDiagnosticsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/workflow:
    get:
      summary: Fetch the latest workflow snapshot for a project.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Latest workflow graph snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowSnapshotResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/workflow-runs:
    get:
      summary: List workflow run history for a project.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Workflow run history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkflowRunResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/workflow-runs/{runId}/cancel:
    post:
      summary: Cancel a running workflow run.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/RunId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Cancelled workflow run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/projects/{projectId}/audit-events:
    get:
      summary: List project audit events.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Audit event history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/external-calls:
    get:
      summary: List external Agent Engine call telemetry.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: External call telemetry history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExternalCallLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/model-invocations:
    get:
      summary: List model invocation telemetry.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Model invocation telemetry history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelInvocationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/events:
    get:
      summary: Stream live Agent events for a project.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/EventSessionToken'
      responses:
        '200':
          description: Server-sent Agent event stream.
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/events/history:
    get:
      summary: List persisted Agent node events.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Agent event history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentEventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/knowledge/sources:
    get:
      summary: List project knowledge sources indexed from artifacts.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Knowledge source list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeSourceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/review:
    get:
      summary: Fetch the review score and paged review issues.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Review score and issues.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/tasks/{taskId}/retry:
    post:
      summary: Retry a failed Agent task.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Retried Agent task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryTaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/projects/{projectId}/artifacts:
    get:
      summary: List project artifacts.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Artifact list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtifactResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/artifacts/{artifactId}:
    put:
      summary: Update an artifact by creating a new draft version.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
        - $ref: '#/components/parameters/SessionToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateArtifactRequest'
      responses:
        '200':
          description: Updated artifact draft version.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/projects/{projectId}/artifacts/{artifactId}/versions:
    get:
      summary: List artifact version history.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Artifact version history.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtifactResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/artifacts/{artifactId}/approve:
    post:
      summary: Approve an artifact draft.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ArtifactId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Approved artifact status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveArtifactResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/projects/{projectId}/exports:
    get:
      summary: List durable export files without large content payloads.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
      responses:
        '200':
          description: Export metadata list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExportFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/projects/{projectId}/exports/{exportFileId}:
    get:
      summary: Fetch a stored export file with content.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ExportFileId'
        - $ref: '#/components/parameters/SessionToken'
      responses:
        '200':
          description: Export file detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportFileDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/projects/{projectId}/export:
    post:
      summary: Render and persist a Markdown or PDF export.
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SessionToken'
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [MARKDOWN, PDF]
            default: MARKDOWN
      responses:
        '200':
          description: Generated export payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    SessionToken:
      type: apiKey
      in: header
      name: X-AutoSpec-Session-Token
  parameters:
    SessionToken:
      name: X-AutoSpec-Session-Token
      in: header
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
    EventSessionToken:
      name: sessionToken
      in: query
      required: false
      schema:
        type: string
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ExportFileId:
      name: exportFileId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    PaginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    PaginationOffset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Unauthorized:
      description: Missing or invalid session token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Forbidden:
      description: Session user lacks the required project role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    NotFound:
      description: Project-scoped resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Conflict:
      description: Operation conflicts with current durable workflow state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    BadGateway:
      description: External Agent Engine failed or returned invalid output.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      required: [token, userId, username, displayName]
      properties:
        token:
          type: string
        userId:
          type: integer
          format: int64
        username:
          type: string
        displayName:
          type: string
    CreateProjectRequest:
      type: object
      required: [name, requirement]
      properties:
        name:
          type: string
          minLength: 1
        requirement:
          type: string
          minLength: 1
